# ============================================================
# application-example.properties
# Copy this file to application.properties and fill in values.
# DO NOT commit application.properties — it is in .gitignore.
# ============================================================

spring.application.name=chatbot

# Gemini AI — get a key at https://aistudio.google.com/apikey
gemini.api.key=YOUR_GEMINI_API_KEY_HERE

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/YOUR_DB_NAME
spring.datasource.username=YOUR_DB_USER
spring.datasource.password=YOUR_DB_PASSWORD
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JWT
jwt.secret=YOUR_JWT_SECRET_HERE
jwt.expiration=86400000
